<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Daisa</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f2f2f2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 10px;
        }
        .header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fdfdfd;
        }
        .message {
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot {
            background: #f1f0f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .input-area {
            display: flex;
            border-top: 1px solid #eee;
            padding: 15px;
            gap: 10px;
            background: #fff;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: #111;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #333; }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="header">Daisa</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask about courses, eligibility..." onkeypress="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const COLLEGE_DATA = `
College Name: Davinci Media College

University Collaborated :
St. Peter’s Institute of Higher Education and Research (Deemed to be University), Chennai.
UGC & AICTE Approved. NAAC A+ Accredited.
St. Peter's website - https://spiher.ac.in/ .

About:
Studio-integrated training institution.
85% hands-on studio training.
University-recognized degrees through St. Peter’s University.

Key Highlights:
- Degrees awarded by St. Peter’s University
- Training inside "Digital Magic" studio
- Exclusive Motion Capture Studio
- AI-Integrated Curriculum
- Partnership with Vanarts, Vancouver
- Placement network: Prime Focus, Reliance Animation, Technicolor
- Placement is 100 Percentage

Degree Programs (3 Years):
Eligibility: 12th / PUC / NIOS pass
- B.Sc Animation
- B.Sc Visual Effects (VFX)
- B.Sc Game Design & Game Art
- B.Sc AI & Digital Cinema
- B.Sc Visual Communication
- B.Sc UI/UX Design

Diploma / Fast Track (1 /2 /3 Years):
Eligibility: 10th Pass (SSLC)
- Degree Path Diploma
- Diploma in Film & TV Production
- Professional Certificate in Movie Color Grading (DI)

Chennai Campus:
Address: Devan Towers, 304, Arcot Road, Vadapalani, Chennai - 600026
Phone: 044-4858 1335 / 97890 59048

Bengaluru Campus:
Address: #327, 2nd Floor, 15th Cross, 2nd Block, Jayanagar, Bengaluru - 560011
Phone: 80737 57707
`;



// --- CONFIGURATION ---
const SUPABASE_URL = "https://lvllgrrpqiqrlvphoimz.supabase.co/functions/v1/chat";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2bGxncnJwcWlxcmx2cGhvaW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MjU1OTUsImV4cCI6MjA4NzUwMTU5NX0.WaEtoIxmnoOapQt9lEskzsir3EdrzK1A3tURoG2Fnos";

// This prompt is sent with EVERY message to keep the AI on track
const SYSTEM_INSTRUCTION = {
    role: "system",
    content: `You are Daisa, the Official Assistant for Davinci Media College.

    STRICT OPERATING RULES:
    1. ZERO OUTSIDE KNOWLEDGE: You do not know anything about the world, history, or people outside of the "COLLEGE DATA" section below. If a name or fact is NOT in the data, you must say: "I don't have that specific detail."
    2. NO GUESSING: Never confirm names  anyone else unless they appear in the DATA below.
    3. TONE: Human and professional. Don't say "I am programmed."
    4. FEES: Always contact to 97890 59048 (Chennai) or 80737 57707 (Bengaluru).
    5. Reply in 1 or 2 Lines only.
    6. CONTEXTUAL ANSWERS: Only mention St. Peter’s University if the user asks about "degree," "recognition," "qualification," or "is it a degree." Do NOT mention it for every question.
    COLLEGE DATA:
       ${COLLEGE_DATA}.`

};
let chatHistory = [];

async function sendMessage() {
    const input = document.getElementById("userInput");
    const userText = input.value.trim();
    if (!userText) return;

    // 1. Update UI
    addMessage(userText, "user");
    input.value = "";

    // 2. Add to chat history
    chatHistory.push({ role: "user", content: userText });

    try {
        // 3. Prepare payload: System Instruction + History
        const response = await fetch(SUPABASE_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
            },
            body: JSON.stringify({
                model: "google/gemma-3-12b-it",
                messages: [SYSTEM_INSTRUCTION, ...chatHistory] // The logic fix is here
            })
        });

        if (!response.ok) throw new Error("Connection Error");

        const data = await response.json();
        const botReply = data.choices?.[0]?.message?.content || "I'm sorry, I'm having trouble connecting.";

        // 4. Update UI & History
        addMessage(botReply, "bot");
        chatHistory.push({ role: "assistant", content: botReply });

        // 5. Context Window Management: Keep last 6 messages to prevent confusion
        if (chatHistory.length > 6) {
            chatHistory = chatHistory.slice(-6);
        }

    } catch (error) {
        console.error(error);
        addMessage("Technical error. Please try again later.", "bot");
    }
}

function addMessage(text, sender) {
    const messagesDiv = document.getElementById("messages");
    const div = document.createElement("div");
    div.classList.add("message", sender);
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
</script>

</body>
</html>
