let chatHistory = [];

async function sendMessage() {
    const input = document.getElementById("userInput");
    const userText = input.value.trim();
    if (!userText) return;

    // 1. Update UI
    addMessage(userText, "user");
    input.value = "";

    // 2. Add to chat history
    chatHistory.push({ role: "user", content: userText });

    try {
        // 3. Prepare payload: System Instruction + History
        const response = await fetch(SUPABASE_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
                "x-widget-secret": "daisa_private_key_2026"

            },
            body: JSON.stringify({
                model: "google/gemma-3-12b-it",
                messages: [SYSTEM_INSTRUCTION, ...chatHistory] // The logic fix is here
            })
        });

        if (!response.ok) throw new Error("Connection Error");

        const data = await response.json();
        const botReply = data.choices?.[0]?.message?.content || "I'm sorry, I'm having trouble connecting.";

        // 4. Update UI & History
        addMessage(botReply, "bot");
        chatHistory.push({ role: "assistant", content: botReply });

        // 5. Context Window Management: Keep last 6 messages to prevent confusion
        if (chatHistory.length > 6) {
            chatHistory = chatHistory.slice(-6);
        }

    } catch (error) {
        console.error(error);
        addMessage("Technical error. Please try again later.", "bot");
    }
}

function addMessage(text, sender) {
    const messagesDiv = document.getElementById("messages");
    const div = document.createElement("div");
    div.classList.add("message", sender);

    // Convert **bold**
    text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");

    // Convert * bullet list
    text = text.replace(/^\* (.*)$/gm, "<li>$1</li>");
if(text.includes("<li>")){
    text = "<ul>" + text + "</ul>";
}

    // Convert phone numbers to clickable
    text = text.replace(
        /(\+?\d[\d\s]{7,}\d)/g,
        '<a href="tel:$1" style="color:inherit;text-decoration:underline;">$1</a>'
    );

    text = text.replace(/(https?:\/\/[^\s]+)/g, function(url){

if(url.includes("youtube.com") || url.includes("youtu.be")){
    return '<a href="'+url+'" target="_blank">▶ Watch Video</a>';
}

if(url.includes("maps.app") || url.includes("google.com/maps")){
    return '<a href="'+url+'" target="_blank">Open Map</a>';
}

return '<a href="'+url+'" target="_blank">'+url+'</a>';
});
text = text.replace(/\n\n/g, "<br>");
    div.innerHTML = text;

    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
