<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Davinci Media College Chatbot</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 420px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

.header {
    background: #222;
    color: white;
    padding: 15px;
    text-align: center;
    border-radius: 10px 10px 0 0;
}

.messages {
    height: 400px;
    overflow-y: auto;
    padding: 15px;
}

.message {
    margin-bottom: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    max-width: 75%;
}

.user {
    background: #d1e7ff;
    align-self: flex-end;
    text-align: right;
}

.bot {
    background: #e9e9e9;
    align-self: flex-start;
}

.input-area {
    display: flex;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
}

button {
    padding: 12px 15px;
    border: none;
    background: #000;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">Davinci Media College Assistant</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask about courses, fees..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

const SUPABASE_URL = "https://lvllgrrpqiqrlvphoimz.supabase.co/functions/v1/chat";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2bGxncnJwcWlxcmx2cGhvaW16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MjU1OTUsImV4cCI6MjA4NzUwMTU5NX0.WaEtoIxmnoOapQt9lEskzsir3EdrzK1A3tURoG2Fnos";

let collegeData = "";
let chatHistory = [];

window.addEventListener("load", async () => {
    try {
        const res = await fetch("./collegeData.json");
        const data = await res.json();
        collegeData = JSON.stringify(data, null, 2);

        chatHistory.push({
            role: "system",
            content: `You are the official assistant of Davinci Media College.

Rules:
- Answer only what is asked.
- Keep the reply to one sentence.
- If the requested course is NOT available, politely say it is not offered AND suggest contacting the Chennai or Bengaluru campus for more information.
- Add contact details if the course is unavailable or provided course duration is unavailable.`
        });

    } catch (err) {
        console.error("Failed to load collegeData.json", err);
    }
});

async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    chatHistory.push({
        role: "user",
        content: collegeData + "\n\nUser Question: " + message
    });

    try {
        const response = await fetch(SUPABASE_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "apikey": SUPABASE_ANON_KEY,
                "Authorization": "Bearer " + SUPABASE_ANON_KEY
            },
            body: JSON.stringify({
                model: "google/gemma-3-12b-it",
                messages: chatHistory
            })
        });

        if (!response.ok) {
            throw new Error("Server error: " + response.status);
        }

        const data = await response.json();
        console.log("EDGE RESPONSE:", data);
        const botReply =
            data.choices?.[0]?.message?.content ||
            data.error ||
            "No response";

        addMessage(botReply, "bot");

        chatHistory.push({
            role: "assistant",
            content: botReply
        });

    } catch (error) {
        console.error(error);
        addMessage("Error connecting to server.", "bot");
    }
}

function addMessage(text, sender) {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.classList.add("message", sender);
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

</script>

</body>
</html>
