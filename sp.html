<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Davinci Media College Chatbot</title>
<style>
   
   * {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* ✅ Responsive container */
.chat-container {
    width: 100%;
    max-width: 420px;
    height: 95vh;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;

    margin: 10px;   /* ✅ adds gap on mobile */
}

/* ✅ Desktop enhancement */
@media (min-width: 768px) {
    .chat-container {
        max-width: 480px;
        height: 90vh;
    }
}

/* ✅ Header */
.header {
    background: #111;
    color: white;
    padding: 16px;
    text-align: center;
    font-weight: bold;
    font-size: 17px;
    letter-spacing: 0.3px;
}

/* ✅ Messages area */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #fafafa;
}

/* ✅ Message bubbles */
.message {
    padding: 10px 14px;
    border-radius: 14px;
    max-width: 80%;
    font-size: 14px;
    line-height: 1.45;
    word-wrap: break-word;
}

/* user bubble */
.user {
    background: #cfe3ff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

/* bot bubble */
.bot {
    background: #eaeaea;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

/* ✅ Input area */
.input-area {
    display: flex;
    border-top: 1px solid #ddd;
    padding: 10px;
    gap: 8px;
    background: #fff;
}

/* ✅ Input */
input {
    flex: 1;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
    outline: none;
    font-size: 14px;
}

/* focus effect */
input:focus {
    border-color: #999;
}

/* ✅ Button */
button {
    padding: 12px 18px;
    border: none;
    background: #111;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
}

button:hover {
    background: #000;
}

button:active {
    transform: scale(0.96);
}
    

    </style>
</head>

function addMessage(text, sender) {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.classList.add("message", sender);
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
