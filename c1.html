<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Gemini Chatbot</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.chat-container {
    width: 400px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
}

.messages {
    height: 400px;
    overflow-y: auto;
    padding: 15px;
}

.message {
    margin-bottom: 10px;
}

.user {
    text-align: right;
    color: blue;
}

.bot {
    text-align: left;
    color: green;
}

.input-area {
    display: flex;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px;
    border: none;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="chat-container">
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const API_KEY = "AIzaSyAZ2fGvkTDxefNfoUG33RpCYdTkfZW9-F0"; // 🔥 Replace this

async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=" + API_KEY,
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
    system_instruction: {
        parts: [{
            text: "You are the official assistant of Davinci Media College. Only answer using the information provided."
        }]
    },
    contents: [{
        parts: [{
            text: collegeInfo + "\n\nUser Question: " + message
        }]
    }]
})


        }
    );

    const data = await response.json();

    const botReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
    addMessage(botReply, "bot");
}

function addMessage(text, sender) {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.classList.add("message", sender);
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}


const collegeInfo = `
Davinci Media College Courses:
- BSc VFX – Fees: ₹1,20,000 per year
- BSc Animation – Fees: ₹1,00,000 per year
- Diploma in Editing – Fees: ₹80,000
`;

</script>

</body>
</html>
